name: LEARNING GHActions

on:
    push:
        paths:
            - "./.github/workflows/main.yaml"
    workflow_dispatch: # manual

jobs:
    HOW-GH-TOKEN-GETS-SET:
        runs-on: ubuntu-latest
        steps:
            - run: env
            - run: gh --version
            - run: gh auth status
            - run: gh repo list
            - run: gh issue list
            - run: gh workflow list
            - run: gh api /repos/:owner/:repo/actions/workflows
