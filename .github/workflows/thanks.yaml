name: THANK YOU

on:
    issues:
        types: [opened]
    workflow_dispatch:

jobs:
  run-on-issue:
    runs-on: ubuntu-latest
    steps:
          - name: PRINT ISSUE DETAILS
            run: |
                echo "An issue was opened!"
                echo "Issue title: ${{ github.event.issue.title }}"
                echo "Opened by: ${{ github.event.issue.user.login }}"
