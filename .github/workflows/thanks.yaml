name: THANK YOU

on:
    issues:
        types: [opened]
    workflow_dispatch:

jobs:
    THANKS:
        runs-on: ubuntu-latest
        steps:
              - uses: actions/github-script@v7
                id: issue-script
                with:
                    # github-token: ${{ secrets.GITHUB_TOKEN }}
                    script: |
                        console.log("WELCOME TO GHA")
                        console.log("---------------")
